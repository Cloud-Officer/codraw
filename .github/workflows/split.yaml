name: Split

on:
  push:
    branches:
      - 'master'

    tags:
      - '*'

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        packages:
          - application
          - aws-tool-kit
          - console
          - contracts
          - core
          - cron-job
          - dependency-injection
          - doctrine-extra
          - entity-migrator
          - fixer
          - framework-extra-bundle
          - graphviz
          - log
          - mailer
          - messenger
          - open-api
          - process
          - profiling
          - security
          - sonata-extra-bundle
          - sonata-import-bundle
          - sonata-integration-bundle
          - tester
          - tester-bundle
          - user-bundle
          - validator
          - workflow
    steps:
      -
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      -
        uses: "./.github/actions/git-split"
        with:
          user_name: 'tlacroix'
          user_email: 'tlacroix@nuagelab.com'
          access_token: "${{secrets.GH_PAT}}"
          git_ref: '${{ github.ref }}'
          source_repository: 'cloud-officer/codraw'
          source_directory: 'packages/${{ matrix.packages }}'
          target_repository: 'cloud-officer/codraw-${{ matrix.packages }}'
